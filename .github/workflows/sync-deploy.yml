name: 同步上游并部署到Workers

on:
  # 定时触发 - 每天UTC 0点（北京时间早上8点）
  schedule:
    - cron: '0 0 * * *'
  
  # 支持手动触发（不用等定时，可以立即运行）
  workflow_dispatch

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      # 第1步：检查你的仓库代码
      - name: 检查代码
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      # 第2步：配置Git（告诉Git用什么身份提交）
      - name: 配置Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      # 第3步：同步上游nodewarden项目的最新代码
      - name: 同步上游代码
        run: |
          git remote add upstream https://github.com/owuzan/nodewarden.git
          git fetch upstream main
          git merge upstream/main --allow-unrelated-histories || echo "合并成功或没有新更新"
          git push origin main || echo "没有新变化"
        continue-on-error: true
      
      # 第4步：部署到你的Cloudflare Workers
      - name: 部署到Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
